services:
  - type: web
    name: salesforce-agentassist-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: "true"
      - key: FRONTEND_ORIGIN
        sync: false
      - key: SALESFORCE_ENABLED
        value: "true"
      - key: SALESFORCE_MODE
        value: MOCK
      - key: SALESFORCE_API_VERSION
        value: v60.0
